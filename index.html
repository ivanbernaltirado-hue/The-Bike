<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>The Bike</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: fixed; top: 10px; left: 10px;
      color: white; font-family: Arial;
      font-size: 12px; background: rgba(0,0,0,0.5);
      padding: 8px; border-radius: 6px;
    }
  </style>
</head>
<body>
<div id="info">🏔️ The Bike — Arrastra para rotar</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================
// THE BIKE ENGINE - FASE 2: MONTAÑAS
// ============================================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 100, 500);

const camera = new THREE.PerspectiveCamera(75,
  window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 60, 150);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ---- LUCES ----
const sun = new THREE.DirectionalLight(0xffffff, 1.3);
sun.position.set(150, 300, 100);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 800;
sun.shadow.camera.left = -300;
sun.shadow.camera.right = 300;
sun.shadow.camera.top = 300;
sun.shadow.camera.bottom = -300;
scene.add(sun);
const ambient = new THREE.AmbientLight(0xc8e8ff, 0.6);
scene.add(ambient);

// ---- FUNCIÓN ALTURA DEL TERRENO ----
function getAltura(x, z) {
  // Colinas base
  let h = Math.sin(x * 0.03) * 5 + Math.cos(z * 0.03) * 5;
  // Baches
  h += Math.sin(x * 0.15 + z * 0.1) * 1.5;
  h += (Math.random() - 0.5) * 0.8;

  // Montaña 1 — Norte
  const d1 = Math.sqrt((x+20)*(x+20) + (z+120)*(z+120));
  h += Math.max(0, 45 - d1 * 0.5);

  // Montaña 2 — Oeste
  const d2 = Math.sqrt((x+130)*(x+130) + (z-20)*(z-20));
  h += Math.max(0, 40 - d2 * 0.45);

  // Montaña 3 — Este
  const d3 = Math.sqrt((x-140)*(x-140) + (z+30)*(z+30));
  h += Math.max(0, 42 - d3 * 0.48);

  return h;
}

// ---- TERRENO PRINCIPAL ----
const W = 400, SEG = 100;
const geoT = new THREE.PlaneGeometry(W, W, SEG, SEG);
const posT = geoT.attributes.position;
for (let i = 0; i < posT.count; i++) {
  const x = posT.getX(i);
  const z = posT.getY(i);
  posT.setZ(i, getAltura(x, z));
}
geoT.computeVertexNormals();

const matT = new THREE.MeshLambertMaterial({ color: 0x4a7c3f });
const terreno = new THREE.Mesh(geoT, matT);
terreno.rotation.x = -Math.PI / 2;
terreno.receiveShadow = true;
scene.add(terreno);

// ---- PIEDRAS ----
for (let i = 0; i < 100; i++) {
  const x = (Math.random() - 0.5) * 380;
  const z = (Math.random() - 0.5) * 380;
  const geo = new THREE.DodecahedronGeometry(0.5 + Math.random() * 2, 0);
  const mat = new THREE.MeshLambertMaterial({
    color: new THREE.Color(0.4 + Math.random()*0.3,
      0.4 + Math.random()*0.2, 0.4 + Math.random()*0.2)
  });
  const p = new THREE.Mesh(geo, mat);
  p.position.set(x, getAltura(x, z) + 0.3, z);
  p.rotation.set(Math.random()*Math.PI,
    Math.random()*Math.PI, Math.random()*Math.PI);
  p.castShadow = true;
  scene.add(p);
}

// ---- ÁRBOLES ----
function crearArbol(x, z, escala) {
  const g = new THREE.Group();
  const tronco = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3*escala, 0.5*escala, 4*escala, 6),
    new THREE.MeshLambertMaterial({ color: 0x8B4513 })
  );
  tronco.position.y = 2 * escala;
  g.add(tronco);
  const copa = new THREE.Mesh(
    new THREE.ConeGeometry(3*escala, 6*escala, 7),
    new THREE.MeshLambertMaterial({ color: 0x2d5a1b })
  );
  copa.position.y = 7 * escala;
  g.add(copa);
  const h = getAltura(x, z);
  g.position.set(x, h, z);
  g.castShadow = true;
  return g;
}

for (let i = 0; i < 80; i++) {
  const x = (Math.random() - 0.5) * 380;
  const z = (Math.random() - 0.5) * 380;
  scene.add(crearArbol(x, z, 0.8 + Math.random() * 0.8));
}

// ---- RUTAS DE BAJADA (líneas en las montañas) ----
const rutaColor = new THREE.MeshLambertMaterial({ color: 0xff6600 });

function crearRuta(puntos) {
  for (let i = 0; i < puntos.length - 1; i++) {
    const p1 = puntos[i];
    const p2 = puntos[i+1];
    const dx = p2.x - p1.x;
    const dz = p2.z - p1.z;
    const len = Math.sqrt(dx*dx + dz*dz);
    const geo = new THREE.BoxGeometry(2, 0.3, len);
    const mesh = new THREE.Mesh(geo, rutaColor);
    mesh.position.set(
      (p1.x + p2.x) / 2,
      getAltura((p1.x+p2.x)/2, (p1.z+p2.z)/2) + 0.5,
      (p1.z + p2.z) / 2
    );
    mesh.rotation.y = Math.atan2(dx, dz);
    scene.add(mesh);
  }
}

// Ruta bajada Montaña 1
crearRuta([
  {x:-20, z:-120}, {x:-15, z:-100}, {x:-5, z:-80},
  {x:5, z:-60}, {x:0, z:-40}, {x:10, z:-20}
]);
// Ruta bajada Montaña 2
crearRuta([
  {x:-130, z:-20}, {x:-110, z:-10}, {x:-90, z:0},
  {x:-70, z:5}, {x:-50, z:0}, {x:-30, z:10}
]);
// Ruta bajada Montaña 3
crearRuta([
  {x:140, z:-30}, {x:120, z:-20}, {x:100, z:-10},
  {x:80, z:0}, {x:60, z:5}, {x:40, z:0}
]);

// ---- CÁMARA ORBITAL ----
let isDragging = false;
let prevX = 0, prevY = 0;
let camAngleX = 0.4, camAngleY = 0;
const camDist = 150;

renderer.domElement.addEventListener('touchstart', e => {
  isDragging = true;
  prevX = e.touches[0].clientX;
  prevY = e.touches[0].clientY;
});
renderer.domElement.addEventListener('touchmove', e => {
  if (!isDragging) return;
  camAngleY += (e.touches[0].clientX - prevX) * 0.005;
  camAngleX += (e.touches[0].clientY - prevY) * 0.005;
  camAngleX = Math.max(0.1, Math.min(1.2, camAngleX));
  prevX = e.touches[0].clientX;
  prevY = e.touches[0].clientY;
});
renderer.domElement.addEventListener('touchend',
  () => { isDragging = false; });

// ---- GAME LOOP ----
function animate() {
  requestAnimationFrame(animate);
  camera.position.x = Math.sin(camAngleY) * camDist * Math.cos(camAngleX);
  camera.position.y = Math.sin(camAngleX) * camDist;
  camera.position.z = Math.cos(camAngleY) * camDist * Math.cos(camAngleX);
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>

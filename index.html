<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>The Bike</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================
// THE BIKE ENGINE - FASE 1: TERRENO BASE
// ============================================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // Cielo azul
scene.fog = new THREE.Fog(0x87CEEB, 50, 300);

const camera = new THREE.PerspectiveCamera(75,
  window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 30, 80);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ---- LUZ SOL ----
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(100, 200, 100);
sun.castShadow = true;
scene.add(sun);
const ambient = new THREE.AmbientLight(0xffd59e, 0.5);
scene.add(ambient);

// ---- FUNCIÓN TERRENO CON BACHES ----
function crearTerreno(ancho, largo, segmentos, escalaAltura, color) {
  const geo = new THREE.PlaneGeometry(ancho, largo, segmentos, segmentos);
  const pos = geo.attributes.position;

  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const z = pos.getY(i);
    // Colinas suaves + baches pequeños
    const altura =
      Math.sin(x * 0.05) * 4 +
      Math.cos(z * 0.05) * 4 +
      Math.sin(x * 0.2 + z * 0.15) * 1.5 +
      (Math.random() - 0.5) * 1.2; // baches
    pos.setZ(i, altura);
  }
  geo.computeVertexNormals();

  const mat = new THREE.MeshLambertMaterial({ color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.receiveShadow = true;
  return mesh;
}

// ---- TERRENO PRINCIPAL ----
const terreno = crearTerreno(400, 400, 80, 1, 0x4a7c3f);
scene.add(terreno);

// ---- PIEDRAS ----
function crearPiedra(x, z) {
  const geo = new THREE.DodecahedronGeometry(
    0.8 + Math.random() * 1.5, 0);
  const mat = new THREE.MeshLambertMaterial({
    color: 0x888888 });
  const piedra = new THREE.Mesh(geo, mat);
  piedra.position.set(x, 0.5, z);
  piedra.rotation.set(
    Math.random(), Math.random(), Math.random());
  piedra.castShadow = true;
  return piedra;
}

// Añadir 80 piedras repartidas
for (let i = 0; i < 80; i++) {
  const x = (Math.random() - 0.5) * 380;
  const z = (Math.random() - 0.5) * 380;
  scene.add(crearPiedra(x, z));
}

// ---- ÁRBOLES SIMPLES ----
function crearArbol(x, z) {
  const grupo = new THREE.Group();
  // Tronco
  const tronco = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3, 0.5, 4, 6),
    new THREE.MeshLambertMaterial({ color: 0x8B4513 })
  );
  tronco.position.y = 2;
  grupo.add(tronco);
  // Copa
  const copa = new THREE.Mesh(
    new THREE.ConeGeometry(3, 6, 7),
    new THREE.MeshLambertMaterial({ color: 0x2d5a1b })
  );
  copa.position.y = 7;
  grupo.add(copa);
  grupo.position.set(x, 0, z);
  grupo.castShadow = true;
  return grupo;
}

for (let i = 0; i < 60; i++) {
  const x = (Math.random() - 0.5) * 380;
  const z = (Math.random() - 0.5) * 380;
  scene.add(crearArbol(x, z));
}

// ---- CÁMARA ORBITAL (arrastrar con dedo) ----
let isDragging = false;
let prevX = 0, prevY = 0;
let camAngleX = 0.3, camAngleY = 0;
let camDist = 80;

renderer.domElement.addEventListener('touchstart', e => {
  isDragging = true;
  prevX = e.touches[0].clientX;
  prevY = e.touches[0].clientY;
});
renderer.domElement.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - prevX;
  const dy = e.touches[0].clientY - prevY;
  camAngleY += dx * 0.005;
  camAngleX += dy * 0.005;
  camAngleX = Math.max(0.1, Math.min(1.2, camAngleX));
  prevX = e.touches[0].clientX;
  prevY = e.touches[0].clientY;
});
renderer.domElement.addEventListener('touchend', () => {
  isDragging = false;
});

// ---- GAME LOOP ----
function animate() {
  requestAnimationFrame(animate);
  camera.position.x = Math.sin(camAngleY) * camDist * Math.cos(camAngleX);
  camera.position.y = Math.sin(camAngleX) * camDist;
  camera.position.z = Math.cos(camAngleY) * camDist * Math.cos(camAngleX);
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>The Bike</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: fixed; top: 10px; left: 10px;
      color: white; font-family: Arial; font-size: 13px;
      background: rgba(0,0,0,0.6); padding: 10px;
      border-radius: 8px; line-height: 1.8;
    }
  </style>
</head>
<body>
<div id="info">
  🟤 Montaña MTB — Bosque descenso<br>
  🛹 Bikepark Urbano<br>
  <small>Arrastra para rotar</small>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 300, 700);

const camera = new THREE.PerspectiveCamera(75,
  window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 180, 380);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// LUCES
const sun = new THREE.DirectionalLight(0xfffbe8, 1.4);
sun.position.set(200, 400, 150);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.left = -500;
sun.shadow.camera.right = 500;
sun.shadow.camera.top = 500;
sun.shadow.camera.bottom = -500;
sun.shadow.camera.far = 1200;
scene.add(sun);
scene.add(new THREE.AmbientLight(0xc8e8ff, 0.55));

// RUIDO SIMPLEX SIMULADO — montaña irregular
function ruido(x, z, freq, amp) {
  return Math.sin(x*freq*1.3 + z*freq*0.7) * amp +
         Math.cos(x*freq*0.9 - z*freq*1.1) * amp * 0.8 +
         Math.sin(x*freq*2.1 + z*freq*1.7) * amp * 0.4 +
         Math.cos(x*freq*1.5 - z*freq*2.3) * amp * 0.3;
}

const MTB_X = -80, MTB_Z = -80;
const BP_X = 120, BP_Z = 120;
const BP_Y = 1.5; // altura fija bikepark

function getAltura(x, z) {
  // Base suave
  let h = ruido(x, z, 0.01, 4);

  // Montaña irregular — varias frecuencias
  const dx = x - MTB_X;
  const dz = z - MTB_Z;
  const d = Math.sqrt(dx*dx + dz*dz);

  if (d < 150) {
    // Forma base de montaña
    const base = Math.max(0, 90 - d * 0.6);
    // Irregularidades grandes
    const irreg1 = ruido(x, z, 0.025, 18);
    // Irregularidades medias — barrancos
    const irreg2 = ruido(x, z, 0.06, 8);
    // Rugosidad pequeña
    const irreg3 = ruido(x, z, 0.15, 3);
    // Combinar — más efecto cerca de la cima
    const factor = Math.min(1, base / 40);
    h += base + irreg1*factor + irreg2*factor + irreg3;
  }

  // Zona bikepark — completamente plana
  const dbp = Math.sqrt((x-BP_X)**2 + (z-BP_Z)**2);
  if (dbp < 80) {
    const blend = Math.max(0, (80-dbp)/30);
    h = h*(1-blend) + BP_Y*blend;
  }

  return h;
}

// COLOR POR VÉRTICE
function getColor(x, z, h) {
  const dbp = Math.sqrt((x-BP_X)**2+(z-BP_Z)**2);
  if (dbp < 75) return new THREE.Color(0x888888);

  const dm = Math.sqrt((x-MTB_X)**2+(z-MTB_Z)**2);
  if (dm < 120) return new THREE.Color(0x6B3F1E);

  if (h > 60) return new THREE.Color(0x9a9a7a);
  return new THREE.Color(0x4a7c3f);
}

// TERRENO
const SEG = 160, TSIZE = 700;
const geoT = new THREE.PlaneGeometry(TSIZE, TSIZE, SEG, SEG);
geoT.rotateX(-Math.PI/2);
const posT = geoT.attributes.position;
const colors = [];

for (let i = 0; i < posT.count; i++) {
  const x = posT.getX(i);
  const z = posT.getZ(i);
  const h = getAltura(x, z);
  posT.setY(i, h);
  const c = getColor(x, z, h);
  colors.push(c.r, c.g, c.b);
}
geoT.setAttribute('color',
  new THREE.Float32BufferAttribute(colors, 3));
geoT.computeVertexNormals();

const terreno = new THREE.Mesh(geoT,
  new THREE.MeshLambertMaterial({ vertexColors: true }));
terreno.receiveShadow = true;
scene.add(terreno);

// ÁRBOLES BOSQUE MTB
function crearAbeto(x, z, alto) {
  const g = new THREE.Group();
  const tronco = new THREE.Mesh(
    new THREE.CylinderGeometry(0.35, 0.65, alto*0.25, 6),
    new THREE.MeshLambertMaterial({ color: 0x4a2800 })
  );
  tronco.position.y = alto*0.12;
  g.add(tronco);
  const cols = [0x0d2e05,0x122e07,0x173808,0x1a4009];
  for (let n = 0; n < 4; n++) {
    const copa = new THREE.Mesh(
      new THREE.ConeGeometry((4-n)*2.2, alto*0.25, 7),
      new THREE.MeshLambertMaterial({ color: cols[n] })
    );
    copa.position.y = alto*0.22 + n*alto*0.19;
    g.add(copa);
  }
  g.position.set(x, getAltura(x,z), z);
  g.castShadow = true;
  return g;
}

for (let i = 0; i < 140; i++) {
  const a = Math.random()*Math.PI*2;
  const d = 15 + Math.random()*85;
  const x = MTB_X + Math.cos(a)*d;
  const z = MTB_Z + Math.sin(a)*d;
  scene.add(crearAbeto(x, z, 11+Math.random()*10));
}
for (let i = 0; i < 40; i++) {
  const x = (Math.random()-0.5)*650;
  const z = (Math.random()-0.5)*650;
  const dm = Math.sqrt((x-MTB_X)**2+(z-MTB_Z)**2);
  const dbp = Math.sqrt((x-BP_X)**2+(z-BP_Z)**2);
  if (dm > 100 && dbp > 85)
    scene.add(crearAbeto(x, z, 5+Math.random()*5));
}

// PIEDRAS
for (let i = 0; i < 100; i++) {
  const x = (Math.random()-0.5)*680;
  const z = (Math.random()-0.5)*680;
  const dbp = Math.sqrt((x-BP_X)**2+(z-BP_Z)**2);
  if (dbp > 80) {
    const v = 0.35+Math.random()*0.3;
    const p = new THREE.Mesh(
      new THREE.DodecahedronGeometry(0.4+Math.random()*2, 0),
      new THREE.MeshLambertMaterial({
        color: new THREE.Color(v,v*0.95,v*0.9)}));
    p.position.set(x, getAltura(x,z)+0.2, z);
    p.rotation.set(Math.random()*3,Math.random()*3,Math.random()*3);
    p.castShadow = true;
    scene.add(p);
  }
}

// RUTA MTB
function crearSegmento(p1, p2, ancho, color) {
  const dx=p2.x-p1.x, dz=p2.z-p1.z;
  const len=Math.sqrt(dx*dx+dz*dz);
  const mx=(p1.x+p2.x)/2, mz=(p1.z+p2.z)/2;
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(ancho, 0.5, len),
    new THREE.MeshLambertMaterial({color}));
  m.position.set(mx, getAltura(mx,mz)+0.4, mz);
  m.rotation.y = Math.atan2(dx,dz);
  scene.add(m);
}

const rutaMTB = [
  {x:MTB_X+5,  z:MTB_Z-90},
  {x:MTB_X-20, z:MTB_Z-70},
  {x:MTB_X+25, z:MTB_Z-50},
  {x:MTB_X-15, z:MTB_Z-28},
  {x:MTB_X+20, z:MTB_Z-5},
  {x:MTB_X-20, z:MTB_Z+20},
  {x:MTB_X+15, z:MTB_Z+45},
  {x:MTB_X+35, z:MTB_Z+70},
];
for (let i=0;i<rutaMTB.length-1;i++)
  crearSegmento(rutaMTB[i],rutaMTB[i+1],3.5,0x8B5E3C);

// Saltos MTB
[rutaMTB[2],rutaMTB[4],rutaMTB[6]].forEach(s=>{
  const salto = new THREE.Mesh(
    new THREE.BoxGeometry(4,2,3.5),
    new THREE.MeshLambertMaterial({color:0x5a3010}));
  salto.position.set(s.x, getAltura(s.x,s.z)+1.8, s.z);
  salto.rotation.x = -0.45;
  salto.castShadow = true;
  scene.add(salto);
});

// BIKEPARK — todo a altura fija BP_Y
const matGris = new THREE.MeshLambertMaterial({color:0x777777});
const matOscuro = new THREE.MeshLambertMaterial({color:0x555555});
const matBorde = new THREE.MeshLambertMaterial({color:0x444444});

// Suelo
const sueloBP = new THREE.Mesh(
  new THREE.PlaneGeometry(110,110), matGris);
sueloBP.rotation.x = -Math.PI/2;
sueloBP.position.set(BP_X, BP_Y, BP_Z);
sueloBP.receiveShadow = true;
scene.add(sueloBP);

// Muros grafiti
const grafitis=[0xe63946,0x4361ee,0xf72585,0x4cc9f0];
[
  {x:BP_X,    z:BP_Z-54, ry:0},
  {x:BP_X,    z:BP_Z+54, ry:0},
  {x:BP_X-54, z:BP_Z,    ry:Math.PI/2},
  {x:BP_X+54, z:BP_Z,    ry:Math.PI/2},
].forEach((m,i)=>{
  const muro = new THREE.Mesh(
    new THREE.BoxGeometry(108,5,0.8),
    new THREE.MeshLambertMaterial({color:grafitis[i]}));
  muro.position.set(m.x, BP_Y+2.5, m.z);
  muro.rotation.y = m.ry;
  muro.castShadow = true;
  scene.add(muro);
});

// Bowl grande — hundido
function crearBowl(x, z, radio, prof) {
  // Hueco
  const geo = new THREE.CylinderGeometry(
    radio, radio*0.6, prof, 20, 1, true);
  const bowl = new THREE.Mesh(geo,
    new THREE.MeshLambertMaterial({
      color:0x666666, side:THREE.BackSide}));
  bowl.position.set(x, BP_Y-prof/2, z);
  scene.add(bowl);
  // Fondo
  const fondo = new THREE.Mesh(
    new THREE.CircleGeometry(radio*0.6, 20),
    matOscuro);
  fondo.rotation.x = -Math.PI/2;
  fondo.position.set(x, BP_Y-prof, z);
  scene.add(fondo);
  // Borde
  const borde = new THREE.Mesh(
    new THREE.TorusGeometry(radio, 0.5, 8, 24),
    matBorde);
  borde.rotation.x = Math.PI/2;
  borde.position.set(x, BP_Y+0.1, z);
  scene.add(borde);
}

crearBowl(BP_X-20, BP_Z-10, 18, 5);
crearBowl(BP_X+15, BP_Z+15, 13, 4);

// Rampas — altura real visible
function crearRampa(x, z, w, h, ry) {
  // Base rampa
  const rampa = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, 10),
    new THREE.MeshLambertMaterial({color:0x666666}));
  rampa.position.set(x, BP_Y+h/2, z);
  rampa.rotation.y = ry;
  rampa.rotation.x = -0.42;
  rampa.castShadow = true;
  scene.add(rampa);
  // Soporte debajo
  const soporte = new THREE.Mesh(
    new THREE.BoxGeometry(w, h/2, 8),
    new THREE.MeshLambertMaterial({color:0x555555}));
  soporte.position.set(x, BP_Y+h/4-0.5, z);
  soporte.rotation.y = ry;
  scene.add(soporte);
}

crearRampa(BP_X+32, BP_Z-18, 7, 4, 0);
crearRampa(BP_X+32, BP_Z+18, 7, 4, Math.PI);
crearRampa(BP_X-34, BP_Z,    7, 3.5, Math.PI/2);

// Bancos
[
  {x:BP_X-48,z:BP_Z-42},
  {x:BP_X+46,z:BP_Z-42},
  {x:BP_X-48,z:BP_Z+42},
].forEach(b=>{
  const banco = new THREE.Mesh(
    new THREE.BoxGeometry(5,0.5,1.5),
    new THREE.MeshLambertMaterial({color:0x8B6914}));
  banco.position.set(b.x, BP_Y+0.8, b.z);
  scene.add(banco);
});

// CÁMARA
let isDragging=false, prevX=0, prevY=0;
let camAngleX=0.42, camAngleY=0.15;
const camDist=380;

function onStart(x,y){isDragging=true;prevX=x;prevY=y;}
function onMove(x,y){
  if(!isDragging)return;
  camAngleY+=(x-prevX)*0.004;
  camAngleX+=(y-prevY)*0.004;
  camAngleX=Math.max(0.1,Math.min(1.3,camAngleX));
  prevX=x;prevY=y;
}
function onEnd(){isDragging=false;}

renderer.domElement.addEventListener('touchstart',
  e=>onStart(e.touches[0].clientX,e.touches[0].clientY));
renderer.domElement.addEventListener('touchmove',
  e=>onMove(e.touches[0].clientX,e.touches[0].clientY));
renderer.domElement.addEventListener('touchend',onEnd);
renderer.domElement.addEventListener('mousedown',
  e=>onStart(e.clientX,e.clientY));
renderer.domElement.addEventListener('mousemove',
  e=>onMove(e.clientX,e.clientY));
renderer.domElement.addEventListener('mouseup',onEnd);

function animate(){
  requestAnimationFrame(animate);
  camera.position.x=Math.sin(camAngleY)*camDist*Math.cos(camAngleX);
  camera.position.y=Math.sin(camAngleX)*camDist;
  camera.position.z=Math.cos(camAngleY)*camDist*Math.cos(camAngleX);
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>

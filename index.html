<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>The Bike</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: fixed; top: 10px; left: 10px;
      color: white; font-family: Arial; font-size: 13px;
      background: rgba(0,0,0,0.6); padding: 10px;
      border-radius: 8px; line-height: 1.8;
    }
  </style>
</head>
<body>
<div id="info">
  🟤 Colina MTB — Bosque descenso<br>
  🟢 Colina Carretera — Descenso road<br>
  🛹 Bikepark Urbano<br>
  <small>Arrastra para rotar</small>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================
// THE BIKE — PROTOTIPO v0.3 — TERRENO ÚNICO
// ============================================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 300, 700);

const camera = new THREE.PerspectiveCamera(75,
  window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 180, 380);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// LUCES
const sun = new THREE.DirectionalLight(0xfffbe8, 1.4);
sun.position.set(200, 400, 150);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.left = -500;
sun.shadow.camera.right = 500;
sun.shadow.camera.top = 500;
sun.shadow.camera.bottom = -500;
sun.shadow.camera.far = 1200;
scene.add(sun);
scene.add(new THREE.AmbientLight(0xc8e8ff, 0.55));

// ============================================
// TERRENO ÚNICO CON COLORES POR VÉRTICE
// ============================================

// Colina MTB — centro izquierda norte
const MTB_X = -130, MTB_Z = -130;
// Colina Carretera — centro derecha norte  
const CAR_X = 130, CAR_Z = -130;
// Bikepark — sur plano
const BP_X = 0, BP_Z = 160;

function getAltura(x, z) {
  // Ruido base suave
  let h = Math.sin(x * 0.015) * 3 + Math.cos(z * 0.015) * 3;
  h += Math.sin(x * 0.06 + z * 0.05) * 1.5;

  // Colina MTB bosque — alta y empinada
  const dMTB = Math.sqrt((x-MTB_X)**2 + (z-MTB_Z)**2);
  h += Math.max(0, 85 - dMTB * 0.55);

  // Colina Carretera — alta y empinada
  const dCAR = Math.sqrt((x-CAR_X)**2 + (z-CAR_Z)**2);
  h += Math.max(0, 80 - dCAR * 0.55);

  // Zona bikepark — completamente plana
  const dBP = Math.sqrt((x-BP_X)**2 + (z-BP_Z)**2);
  if (dBP < 70) h *= Math.max(0, (dBP - 30) / 40);

  return h;
}

function getColor(x, z, altura) {
  // Zona bikepark — gris hormigón
  const dBP = Math.sqrt((x-BP_X)**2 + (z-BP_Z)**2);
  if (dBP < 65) return new THREE.Color(0x888888);

  // Zona bosque MTB — tierra marrón
  const dMTB = Math.sqrt((x-MTB_X)**2 + (z-MTB_Z)**2);
  if (dMTB < 90) return new THREE.Color(0x6B3F1E);

  // Cumbre nieve carretera
  if (altura > 55) return new THREE.Color(0xeeeeee);

  // Verde hierba
  return new THREE.Color(0x4a7c3f);
}

// Crear terreno con colores por vértice
const SEG = 150;
const TSIZE = 700;
const geoT = new THREE.PlaneGeometry(TSIZE, TSIZE, SEG, SEG);
geoT.rotateX(-Math.PI / 2);

const posT = geoT.attributes.position;
const colors = [];

for (let i = 0; i < posT.count; i++) {
  const x = posT.getX(i);
  const z = posT.getZ(i);
  const h = getAltura(x, z);
  posT.setY(i, h);
  const c = getColor(x, z, h);
  colors.push(c.r, c.g, c.b);
}

geoT.setAttribute('color',
  new THREE.Float32BufferAttribute(colors, 3));
geoT.computeVertexNormals();

const matT = new THREE.MeshLambertMaterial({
  vertexColors: true
});
const terreno = new THREE.Mesh(geoT, matT);
terreno.receiveShadow = true;
scene.add(terreno);

// ============================================
// FUNCIÓN ALTURA REAL DEL TERRENO
// (para colocar objetos encima correctamente)
// ============================================
function alturaEn(x, z) {
  return getAltura(x, z);
}

// ============================================
// CAMINOS — pegados al terreno
// ============================================
function crearCamino(puntos, ancho, color) {
  const mat = new THREE.MeshLambertMaterial({ color });
  for (let i = 0; i < puntos.length - 1; i++) {
    const p1 = puntos[i];
    const p2 = puntos[i+1];
    const dx = p2.x - p1.x;
    const dz = p2.z - p1.z;
    const len = Math.sqrt(dx*dx + dz*dz);
    const mx = (p1.x+p2.x)/2;
    const mz = (p1.z+p2.z)/2;
    const h = alturaEn(mx, mz);
    const geo = new THREE.BoxGeometry(ancho, 0.6, len);
    const m = new THREE.Mesh(geo, mat);
    m.position.set(mx, h + 0.4, mz);
    m.rotation.y = Math.atan2(dx, dz);
    m.receiveShadow = true;
    scene.add(m);
  }
}

// Ruta MTB — baja desde cima colina marrón
crearCamino([
  {x:MTB_X+5,  z:MTB_Z-75},
  {x:MTB_X-15, z:MTB_Z-55},
  {x:MTB_X+20, z:MTB_Z-35},
  {x:MTB_X-10, z:MTB_Z-15},
  {x:MTB_X+25, z:MTB_Z+10},
  {x:MTB_X-15, z:MTB_Z+30},
  {x:MTB_X+10, z:MTB_Z+55},
  {x:MTB_X+30, z:MTB_Z+75},
], 3.5, 0x8B5E3C);

// Saltos MTB
[
  {x:MTB_X+20, z:MTB_Z-35},
  {x:MTB_X+25, z:MTB_Z+10},
  {x:MTB_X-15, z:MTB_Z+30},
].forEach(s => {
  const salto = new THREE.Mesh(
    new THREE.BoxGeometry(4, 2, 3.5),
    new THREE.MeshLambertMaterial({ color: 0x5a3010 })
  );
  salto.position.set(s.x, alturaEn(s.x,s.z)+1.8, s.z);
  salto.rotation.x = -0.45;
  salto.castShadow = true;
  scene.add(salto);
});

// Carretera — baja desde cima colina verde
crearCamino([
  {x:CAR_X,    z:CAR_Z-75},
  {x:CAR_X-25, z:CAR_Z-55},
  {x:CAR_X+20, z:CAR_Z-35},
  {x:CAR_X-15, z:CAR_Z-10},
  {x:CAR_X+25, z:CAR_Z+15},
  {x:CAR_X-10, z:CAR_Z+40},
  {x:CAR_X+15, z:CAR_Z+65},
  {x:CAR_X,    z:CAR_Z+90},
], 7, 0x111111);

// Línea amarilla central carretera
crearCamino([
  {x:CAR_X,    z:CAR_Z-75},
  {x:CAR_X-25, z:CAR_Z-55},
  {x:CAR_X+20, z:CAR_Z-35},
  {x:CAR_X-15, z:CAR_Z-10},
  {x:CAR_X+25, z:CAR_Z+15},
  {x:CAR_X-10, z:CAR_Z+40},
  {x:CAR_X+15, z:CAR_Z+65},
  {x:CAR_X,    z:CAR_Z+90},
], 0.6, 0xffff00);

// Camino tierra conector
crearCamino([
  {x:MTB_X+30, z:MTB_Z+75},
  {x:-60, z:20},
  {x:0,   z:60},
  {x:60,  z:20},
  {x:CAR_X, z:CAR_Z+90},
], 4, 0x9B7355);

// Camino al bikepark
crearCamino([
  {x:0, z:60},
  {x:0, z:100},
  {x:BP_X, z:BP_Z-60},
], 4, 0x9B7355);

// ============================================
// ÁRBOLES BOSQUE MTB
// ============================================
function crearAbeto(x, z, alto) {
  const g = new THREE.Group();
  const tronco = new THREE.Mesh(
    new THREE.CylinderGeometry(0.35, 0.65, alto*0.25, 6),
    new THREE.MeshLambertMaterial({ color: 0x4a2800 })
  );
  tronco.position.y = alto * 0.12;
  g.add(tronco);
  const cols = [0x0d2e05, 0x122e07, 0x173808, 0x1a4009];
  for (let n = 0; n < 4; n++) {
    const copa = new THREE.Mesh(
      new THREE.ConeGeometry((4-n)*2.2, alto*0.25, 7),
      new THREE.MeshLambertMaterial({ color: cols[n] })
    );
    copa.position.y = alto*0.22 + n*alto*0.19;
    g.add(copa);
  }
  g.position.set(x, alturaEn(x,z), z);
  g.castShadow = true;
  return g;
}

// Bosque denso zona MTB
for (let i = 0; i < 130; i++) {
  const a = Math.random()*Math.PI*2;
  const d = 18 + Math.random()*72;
  const x = MTB_X + Math.cos(a)*d;
  const z = MTB_Z + Math.sin(a)*d;
  scene.add(crearAbeto(x, z, 12 + Math.random()*10));
}

// Árboles dispersos resto
for (let i = 0; i < 50; i++) {
  const x = (Math.random()-0.5)*650;
  const z = (Math.random()-0.5)*650;
  const dMTB = Math.sqrt((x-MTB_X)**2+(z-MTB_Z)**2);
  const dBP = Math.sqrt((x-BP_X)**2+(z-BP_Z)**2);
  const dCAR = Math.sqrt((x-CAR_X)**2+(z-CAR_Z)**2);
  if (dMTB > 95 && dBP > 80 && dCAR > 60)
    scene.add(crearAbeto(x, z, 5+Math.random()*5));
}

// Piedras
for (let i = 0; i < 120; i++) {
  const x = (Math.random()-0.5)*680;
  const z = (Math.random()-0.5)*680;
  const dBP = Math.sqrt((x-BP_X)**2+(z-BP_Z)**2);
  if (dBP > 75) {
    const g = new THREE.DodecahedronGeometry(0.4+Math.random()*2, 0);
    const v = 0.35+Math.random()*0.3;
    const p = new THREE.Mesh(g,
      new THREE.MeshLambertMaterial({
        color: new THREE.Color(v, v*0.95, v*0.9)}));
    p.position.set(x, alturaEn(x,z)+0.2, z);
    p.rotation.set(Math.random()*3, Math.random()*3, Math.random()*3);
    p.castShadow = true;
    scene.add(p);
  }
}

// ============================================
// BIKEPARK URBANO — zona plana
// ============================================
const bpY = alturaEn(BP_X, BP_Z) + 0.2;

// Muros grafiti
const grafitis = [0xe63946,0x4361ee,0xf72585,0x4cc9f0];
[
  {x:BP_X,     z:BP_Z-48, w:95, ry:0},
  {x:BP_X,     z:BP_Z+48, w:95, ry:0},
  {x:BP_X-48,  z:BP_Z,    w:95, ry:Math.PI/2},
  {x:BP_X+48,  z:BP_Z,    w:95, ry:Math.PI/2},
].forEach((m,i) => {
  const muro = new THREE.Mesh(
    new THREE.BoxGeometry(m.w, 5, 0.8),
    new THREE.MeshLambertMaterial({ color: grafitis[i] })
  );
  muro.position.set(m.x, bpY+2.5, m.z);
  muro.rotation.y = m.ry;
  muro.castShadow = true;
  scene.add(muro);
});

// Suelo hormigón bikepark
const sueloBP = new THREE.Mesh(
  new THREE.PlaneGeometry(95, 95),
  new THREE.MeshLambertMaterial({ color: 0x777777 })
);
sueloBP.rotation.x = -Math.PI/2;
sueloBP.position.set(BP_X, bpY, BP_Z);
sueloBP.receiveShadow = true;
scene.add(sueloBP);

// Bowls
function crearBowl(x, z, radio) {
  const geo = new THREE.SphereGeometry(
    radio, 20, 10, 0, Math.PI*2, 0, Math.PI/2);
  const bowl = new THREE.Mesh(geo,
    new THREE.MeshLambertMaterial({
      color: 0x888888, side: THREE.BackSide}));
  bowl.position.set(x, bpY-radio*0.5, z);
  scene.add(bowl);
  const borde = new THREE.Mesh(
    new THREE.TorusGeometry(radio, 0.5, 8, 24),
    new THREE.MeshLambertMaterial({ color: 0x555555 }));
  borde.position.set(x, bpY+0.3, z);
  borde.rotation.x = Math.PI/2;
  scene.add(borde);
}
crearBowl(BP_X-20, BP_Z-12, 18);
crearBowl(BP_X+16, BP_Z+14, 13);

// Rampas bikepark
[
  {x:BP_X+32, z:BP_Z-18, ry:0},
  {x:BP_X+32, z:BP_Z+18, ry:Math.PI},
  {x:BP_X-33, z:BP_Z,    ry:Math.PI/2},
].forEach(r => {
  const rampa = new THREE.Mesh(
    new THREE.BoxGeometry(6, 3, 9),
    new THREE.MeshLambertMaterial({ color: 0x666666 })
  );
  rampa.position.set(r.x, bpY+1.8, r.z);
  rampa.rotation.y = r.ry;
  rampa.rotation.x = -0.38;
  rampa.castShadow = true;
  scene.add(rampa);
});

// Bancos
[
  {x:BP_X-42, z:BP_Z-38},
  {x:BP_X+40, z:BP_Z-38},
  {x:BP_X-42, z:BP_Z+38},
].forEach(b => {
  const banco = new THREE.Mesh(
    new THREE.BoxGeometry(5, 0.5, 1.5),
    new THREE.MeshLambertMaterial({ color: 0x8B6914 })
  );
  banco.position.set(b.x, bpY+0.8, b.z);
  scene.add(banco);
});

// ============================================
// CÁMARA ORBITAL — táctil y ratón
// ============================================
let isDragging = false;
let prevX = 0, prevY = 0;
let camAngleX = 0.42, camAngleY = 0.15;
const camDist = 380;

function onStart(x,y){isDragging=true;prevX=x;prevY=y;}
function onMove(x,y){
  if(!isDragging) return;
  camAngleY+=(x-prevX)*0.004;
  camAngleX+=(y-prevY)*0.004;
  camAngleX=Math.max(0.1,Math.min(1.3,camAngleX));
  prevX=x; prevY=y;
}
function onEnd(){isDragging=false;}

renderer.domElement.addEventListener('touchstart',
  e=>onStart(e.touches[0].clientX,e.touches[0].clientY));
renderer.domElement.addEventListener('touchmove',
  e=>onMove(e.touches[0].clientX,e.touches[0].clientY));
renderer.domElement.addEventListener('touchend',onEnd);
renderer.domElement.addEventListener('mousedown',
  e=>onStart(e.clientX,e.clientY));
renderer.domElement.addEventListener('mousemove',
  e=>onMove(e.clientX,e.clientY));
renderer.domElement.addEventListener('mouseup',onEnd);

// GAME LOOP
function animate(){
  requestAnimationFrame(animate);
  camera.position.x=Math.sin(camAngleY)*camDist*Math.cos(camAngleX);
  camera.position.y=Math.sin(camAngleX)*camDist;
  camera.position.z=Math.cos(camAngleY)*camDist*Math.cos(camAngleX);
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
